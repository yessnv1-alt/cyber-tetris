<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Tetris 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --bg-dark: #0a0a12;
            --panel-bg: #1a1a2e;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            touch-action: none; /* Previene scroll en móvil al jugar */
        }

        .game-container {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            background: var(--panel-bg);
            border-radius: 15px;
        }

        #tetris-canvas {
            border: 4px solid #333;
            background: #000;
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
            box-shadow: 0 0 15px var(--neon-pink);
        }

        .stats-panel {
            background: rgba(0, 0, 0, 0.5);
            border-left: 3px solid var(--neon-pink);
            padding: 15px;
        }

        .btn-cyber {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-cyber:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .controls-hint { font-size: 0.8rem; color: #888; }
        
        /* Controles táctiles */
        .touch-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        @media (min-width: 768px) {
            .touch-controls { display: none; }
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="game-container">
        <div class="row g-4">
            <div class="col-lg-7 text-center">
                <h2 class="text-info mb-3">SYSTEM: TETRIS</h2>
                <canvas id="tetris-canvas" width="240" height="400"></canvas>
            </div>

            <div class="col-lg-5">
                <div class="stats-panel mb-4">
                    <h4><span class="text-warning">⚡</span> STATUS</h4>
                    <hr class="border-secondary">
                    <p class="h5">PUNTOS: <span id="score" class="text-info">0</span></p>
                    <p class="h5">TIEMPO: <span id="timer" class="text-danger">02:00</span></p>
                    <p class="h5">NIVEL: <span id="level-display" class="text-success">1</span></p>
                </div>

                <div class="mb-4">
                    <label class="form-label text-info">DIFICULTAD (VELOCIDAD)</label>
                    <select id="difficulty" class="form-select bg-dark text-white border-secondary">
                        <option value="1000">NOVATO (Lento)</option>
                        <option value="600" selected>OPERATIVO (Medio)</option>
                        <option value="300">CYBERPUNK (Rápido)</option>
                        <option value="100">GOD MODE (Extremo)</option>
                    </select>
                </div>

                <div class="d-grid gap-2">
                    <button id="start-btn" class="btn btn-cyber py-3">INICIAR SECUENCIA</button>
                </div>

                <div class="controls-hint mt-4">
                    <p class="mb-1">⌨️ <b>Teclado:</b> Flechas (Mov), Z/X (Rotar), Espacio (Drop)</p>
                    <p class="mb-1">🖱️ <b>Mouse:</b> Arrastra para mover, Click para rotar</p>
                </div>
            </div>
        </div>

        <div class="touch-controls text-center">
            <button class="btn btn-outline-info" onmousedown="moveLeft()">◀</button>
            <button class="btn btn-outline-info" onmousedown="playerRotate(1)">↻</button>
            <button class="btn btn-outline-info" onmousedown="moveRight()">▶</button>
            <div></div>
            <button class="btn btn-outline-danger" onmousedown="playerDrop()">▼</button>
            <div></div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('tetris-canvas');
    const context = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const timerElement = document.getElementById('timer');

    context.scale(20, 20);

    // Definición de piezas (Matrices)
    function createPiece(type) {
        if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
        if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
        if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
        if (type === 'O') return [[4, 4], [4, 4]];
        if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
        if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
        if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
    }

    const colors = [
        null,
        '#00f3ff', // I - Cyan
        '#ffaa00', // L - Naranja
        '#0055ff', // J - Azul
        '#ffff00', // O - Amarillo
        '#ff0000', // Z - Rojo
        '#00ff00', // S - Verde
        '#ff00ff', // T - Morado
    ];

    function createMatrix(w, h) {
        const matrix = [];
        while (h--) matrix.push(new Array(w).fill(0));
        return matrix;
    }

    // Dibujo
    function draw() {
        context.fillStyle = '#000';
        context.fillRect(0, 0, canvas.width, canvas.height);
        drawMatrix(arena, {x: 0, y: 0});
        drawMatrix(player.matrix, player.pos);
    }

    function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    // Cuerpo del bloque
                    context.fillStyle = colors[value];
                    context.fillRect(x + offset.x, y + offset.y, 1, 1);
                    // Borde de estilo
                    context.lineWidth = 0.05;
                    context.strokeStyle = 'white';
                    context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                }
            });
        });
    }

    // Lógica de colisión y fusión
    function arenaSweep() {
        let rowCount = 1;
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) continue outer;
            }
            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            ++y;
            player.score += rowCount * 100;
            rowCount *= 2;
        }
        scoreElement.innerText = player.score;
    }

    function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                    return true;
                }
            }
        }
        return false;
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    arena[y + player.pos.y][x + player.pos.x] = value;
                }
            });
        });
    }

    function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) {
                [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
        }
        if (dir > 0) matrix.forEach(row => row.reverse());
        else matrix.reverse();
    }

    // Acciones del Jugador
    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
        }
        dropCounter = 0;
    }

    function moveLeft() {
        player.pos.x--;
        if (collide(arena, player)) player.pos.x++;
    }

    function moveRight() {
        player.pos.x++;
        if (collide(arena, player)) player.pos.x--;
    }

    function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) {
                rotate(player.matrix, -dir);
                player.pos.x = pos;
                return;
            }
        }
    }

    function playerReset() {
        const pieces = 'ILJOTSZ';
        player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
        if (collide(arena, player)) {
            gameOver();
        }
    }

    // Estado del Juego
    const arena = createMatrix(12, 20);
    const player = {
        pos: {x: 0, y: 0},
        matrix: null,
        score: 0,
    };

    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;
    let gameActive = false;
    let timeLeft = 120; // 2 minutos

    function update(time = 0) {
        if (!gameActive) return;
        
        const deltaTime = time - lastTime;
        lastTime = time;

        dropCounter += deltaTime;
        if (dropCounter > dropInterval) {
            playerDrop();
        }

        draw();
        requestAnimationFrame(update);
    }

    function gameOver() {
        gameActive = false;
        alert("CONEXIÓN PERDIDA. Puntaje Final: " + player.score);
        document.location.reload();
    }

    // Temporizador
    function startTimer() {
        const countdown = setInterval(() => {
            if (!gameActive) { clearInterval(countdown); return; }
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            timerElement.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                gameOver();
            }
        }, 1000);
    }

    // Controles e Interacción
    document.addEventListener('keydown', event => {
        if (!gameActive) return;
        if (event.keyCode === 37) moveLeft();
        else if (event.keyCode === 39) moveRight();
        else if (event.keyCode === 40) playerDrop();
        else if (event.keyCode === 81 || event.keyCode === 90) playerRotate(-1); // Q o Z
        else if (event.keyCode === 87 || event.keyCode === 88) playerRotate(1);  // W o X
        else if (event.keyCode === 32) { // Espacio para Drop rápido
            while(!collide(arena, player)) { player.pos.y++; }
            player.pos.y--;
            playerDrop();
        }
    });

    // Mouse Drag Logic
    let isDragging = false;
    canvas.addEventListener('mousedown', () => isDragging = true);
    window.addEventListener('mouseup', () => isDragging = false);
    canvas.addEventListener('mousemove', e => {
        if (isDragging && gameActive) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / (rect.width / 12);
            const targetX = Math.floor(x) - 1;
            if (targetX > player.pos.x) moveRight();
            else if (targetX < player.pos.x) moveLeft();
        }
    });
    canvas.addEventListener('click', () => { if(gameActive) playerRotate(1); });

    // Botón Inicio
    document.getElementById('start-btn').addEventListener('click', () => {
        dropInterval = parseInt(document.getElementById('difficulty').value);
        gameActive = true;
        playerReset();
        startTimer();
        update();
        document.getElementById('start-btn').disabled = true;
    });

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
